- id: "garage_lights_schedule"
  alias: "Garage Lights Schedule"
  trigger:
    - platform: time
      at: "19:00:00"
      id: lights_on
    - platform: time
      at: "07:00:00"
      id: lights_off
  action:
    - choose:
        - conditions:
            - condition: trigger
              id: lights_on
          sequence:
            - service: light.turn_on
              target:
                entity_id:
                  - light.garage_bulb_1
                  - light.garage_bulb_2
        - conditions:
            - condition: trigger
              id: lights_off
          sequence:
            - service: light.turn_off
              target:
                entity_id:
                  - light.garage_bulb_1
                  - light.garage_bulb_2
